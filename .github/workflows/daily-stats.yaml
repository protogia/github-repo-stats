name: Daily GitHub Stats Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install Dependencies
        run: poetry install --no-interaction --no-root

      - name: Run Stats Script
        env:
          USERNAME:  ${{ github.repository_owner }}
          PARENT_REPO_NAME:  ${{ vars.parent_repository }}
        run: |
          poetry run python src/repostats.py -m -c -g -l -v -r -F 

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.csv plots/*.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily stats update: $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Trigger Parent Repo Update
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: Bearer ${{ secrets.ACCESS_TOKEN }}" \
          https://api.github.com/repos/${{ env.USERNAME }}/${{ env.PARENT_REPO_NAME }}/dispatches \
          -d '{"event_type": "update-stats-submodule"}'